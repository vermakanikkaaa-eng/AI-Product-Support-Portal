<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Assistant</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            max-width: 700px;
            margin: 20px auto;
            padding: 20px;
        }
        .chat-box {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            background: #f9f9f9;
            margin-bottom: 15px;
        }
        .msg-user {
            background: #007bff;
            color: white;
            padding: 10px 14px;
            border-radius: 18px 18px 4px 18px;
            margin: 8px 0 8px auto;
            max-width: 75%;
            width: fit-content;
            margin-left: auto;
            font-size: 14px;
        }
        .msg-ai {
            background: #e9e9e9;
            color: #333;
            padding: 10px 14px;
            border-radius: 18px 18px 18px 4px;
            margin: 8px auto 8px 0;
            max-width: 75%;
            width: fit-content;
            font-size: 14px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .input-area button {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .input-area button:hover {
            background: #0056b3;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .typing {
            color: #999;
            font-style: italic;
            font-size: 13px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

<div class="product-container">
    <h1>🔧 Diagnostic Assistant</h1>

    <h2>Select Product</h2>
    <select id="assistantProduct" onchange="startChat()">
        <option value="">-- Choose Product --</option>
        <option value="Honda Activa 6G - Scooter">Honda Activa 6G</option>
        <option value="LG Split AC - Air Conditioner">LG Split AC</option>
        <option value="Kent RO - Water Purifier">Kent RO</option>
        <option value="Samsung Washing Machine - Home Appliance">Samsung Washing Machine</option>
        <option value="Dell Inspiron - Laptop">Dell Inspiron Laptop</option>
    </select>

    <div id="chatArea" style="display:none;">
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Apni problem yahan likho..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            />
            <button onclick="sendMessage()">Send ➤</button>
        </div>
    </div>

    <br>
    <button onclick="window.location.href='product.html'">← Back To Product Page</button>
</div>

<script>
// ⚠️ APNI KEY YAHAN DAALO - sirf yahi ek jagah change karni hai
const OPENROUTER_API_KEY = prompt("Enter your API Key");



let chatHistory = [];
let selectedProduct = "";

function startChat() {
    selectedProduct = document.getElementById("assistantProduct").value;
    if (!selectedProduct) return;
// Purani chat load karo
const saved = localStorage.getItem("lastChat_" + selectedProduct);
if (saved) {
    const data = JSON.parse(saved);
    if (confirm("Purani conversation continue karein?")) {
        chatHistory = data.history;
        document.getElementById("chatBox").innerHTML = "";
        document.getElementById("chatArea").style.display = "block";
        chatHistory.forEach(msg => {
            if (msg.role === "user") addMessage("user", msg.content);
            if (msg.role === "assistant") addMessage("ai", msg.content);
        });
        return;
    }
}
    // Reset sab
    chatHistory = [];
    document.getElementById("chatBox").innerHTML = "";
    document.getElementById("chatArea").style.display = "block";

    // System prompt - AI ko technician banata hai
    chatHistory.push({
        role: "system",
        content: `You are an expert technician and support engineer for ${selectedProduct}. 
        Your job is to diagnose problems like an experienced mechanic - systematically.
        
        Rules:
        - NEVER give the answer directly at first
        - Ask ONE question at a time to understand the problem better
        - Based on user's answer, ask next relevant question
        - Slowly narrow down the cause
        - Only give solution when you are confident about the root cause
        - Keep responses short and clear
        - Always must respond in Hinglish only,never use Hindi or any other language
        -Do not generate long reports
        -Keep finl diagnosis under 4 lines
        -Keep recommended solutions short and practical
        - When giving solution, provide clear step-by-step instructions`
    });

    // Welcome message
    addMessage("ai", `Namaste! Main ${selectedProduct} ka expert technician hoon. 😊\n\nAapki kya problem hai? Describe karo — main diagnose karne mein help karunga!`);
}

function addMessage(type, text) {
    const chatBox = document.getElementById("chatBox");
    
    const div = document.createElement("div");
    div.className = type === "user" ? "msg-user" : "msg-ai";
    div.innerText = text;
    
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    saveChat();
}
function saveChat() {
    const chatData = {
        product: selectedProduct,
        history: chatHistory,
        time: new Date().toLocaleString()
    };
    localStorage.setItem("lastChat_" + selectedProduct, JSON.stringify(chatData));
}

function addTyping() {
    const chatBox = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typingIndicator";
    div.innerText = "🔧 Technician is thinking...";
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById("typingIndicator");
    if (el) el.remove();
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const userText = input.value.trim();
    if (!userText) return;

    // User message dikhao
    addMessage("user", userText);
    input.value = "";

    // History mein add karo
    chatHistory.push({
        role: "user",
        content: userText
    });

    // Typing indicator
    addTyping();

    try {
        console.log("Send button clicked");

        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            
            method: "POST",
            headers: {
                "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                "Content-Type": "application/json",
                "HTTP-Referer": "http://localhost:5500",
                "X-Title": "Product Support Portal"
            },
            body: JSON.stringify({
                model:"openai/gpt-oss-120b:free",
                messages: chatHistory,
                max_tokens: 400,
                temperature: 0.7
            })
        });
        console.log("Response received");

        const data = await response.json();
        console.log(data);

        removeTyping();

        if (data.choices && data.choices[0]) {
            const aiReply = data.choices[0].message.content;
            
            // History mein add karo
            chatHistory.push({
                role: "assistant",
                content: aiReply
            });

            addMessage("ai", aiReply);
            if (
    aiReply.toLowerCase().includes("replace") ||
    aiReply.toLowerCase().includes("repair") ||
    aiReply.toLowerCase().includes("solution") ||
    aiReply.toLowerCase().includes("root cause")
) {
    generateReport(aiReply);
}
        } else {
            addMessage("ai", "Server busy hai 5-10 second baad try karna.");
            console.error("API Error:", data);
        }

    } catch (error) {
        removeTyping();
        addMessage("ai", "Internet connection check karo aur dobara try karo! ❌");
        console.error("Fetch Error:", error);
    }
}
function generateReport(solution) {

    const report = `
📋 DIAGNOSTIC REPORT

Product: ${selectedProduct}

Issue: Diagnosed
Status: Resolved ✅
`;

    addMessage("ai", report);
}
</script>

</body>
</html>
